<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Expansion</title>
<style>
  :root {
    --bg: #faf8f5;
    --ink: #1f1d1a;
    --ink-soft: #5c574e;
    --line: #e2ddd2;
    --accent: #7a5c3e;
    --accent-soft: #f1e9dd;
    --serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', Palatino, serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--serif); line-height: 1.55; }
  #app { max-width: 760px; margin: 0 auto; padding: 32px 24px 120px; }

  .phase-bar { display: flex; gap: 0; align-items: center; justify-content: center; margin-bottom: 40px; font-family: var(--sans); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); }
  .phase-step { padding: 6px 14px; }
  .phase-step.active { color: var(--ink); font-weight: 600; }
  .phase-step.done { color: var(--accent); }
  .phase-sep { color: var(--line); }

  .metrics-step-bar { text-align: center; font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin: -28px 0 28px; letter-spacing: 0.04em; }
  .metrics-step-bar strong { color: var(--ink); }

  h1.title { font-size: 22px; font-weight: 400; text-align: center; margin: 0 0 6px; }
  p.sub { text-align: center; color: var(--ink-soft); font-family: var(--sans); font-size: 13px; margin: 0 0 36px; }

  .keybar { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; margin-bottom: 28px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .keybar input[type=password] { flex: 1; min-width: 180px; font-family: var(--sans); font-size: 12px; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
  .keybar button { font-family: var(--sans); font-size: 12px; }

  .card { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 24px; margin-bottom: 20px; }
  .card.dim { opacity: 0.55; }

  textarea { width: 100%; font-family: var(--serif); font-size: 16px; color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 16px; resize: vertical; min-height: 120px; background: #fff; }
  textarea:focus, input:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }

  button { font-family: var(--sans); font-size: 13px; font-weight: 600; background: var(--ink); color: #fff; border: none; border-radius: 7px; padding: 10px 18px; cursor: pointer; }
  button.secondary { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  button.link { background: none; color: var(--accent); border: none; padding: 0; font-weight: 600; text-decoration: underline; cursor: pointer; font-size: 12px; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button:hover:not(:disabled) { filter: brightness(1.1); }

  .row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
  .row.end { justify-content: flex-end; }
  .row.between { justify-content: space-between; }

  .label { font-family: var(--sans); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft); margin-bottom: 10px; }
  .label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .label-row .label { margin-bottom: 0; }

  .round-num { font-family: var(--sans); font-size: 11px; color: var(--ink-soft); margin-bottom: 14px; }
  .question-item { margin-bottom: 18px; }
  .question-item label { display: block; font-size: 16px; margin-bottom: 8px; }
  .question-item input[type=text] { width: 100%; font-family: var(--serif); font-size: 15px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 6px; background: #fdfcfa; }

  .gap-note { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); background: var(--accent-soft); border-radius: 6px; padding: 10px 12px; margin-top: 8px; }

  .synth-doc h2 { font-size: 13px; font-family: var(--sans); text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); border-bottom: 1px solid var(--line); padding-bottom: 8px; margin: 36px 0 16px; }
  .synth-doc h2:first-child { margin-top: 0; }
  .synth-doc p { font-size: 17px; }
  .change-item { margin-bottom: 14px; font-size: 15px; }
  .change-item .arrow-line { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin: 2px 0; }
  .blind-spot { border-left: 3px solid var(--accent); padding-left: 14px; margin-bottom: 16px; }
  .blind-spot .bs-text { font-size: 15px; }
  .blind-spot .bs-why { font-family: var(--sans); font-size: 13px; color: var(--ink-soft); margin-top: 4px; }
  .bs-status { font-family: var(--sans); font-size: 12px; margin-top: 6px; }
  .bs-status.integrated { color: var(--accent); }
  ul.plain { padding-left: 20px; }
  ul.plain li { margin-bottom: 8px; font-size: 15px; }
  blockquote.original { font-style: italic; color: var(--ink-soft); border-left: 3px solid var(--line); padding-left: 16px; margin: 0; font-size: 15px; }

  .top-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

  .suggestion-card { border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 14px; background: #fff; }
  .suggestion-card.recommended { border-color: var(--accent); background: var(--accent-soft); }
  .suggestion-card .sug-label { font-family: var(--sans); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--accent); margin-bottom: 8px; }
  .suggestion-card .sug-text { font-size: 16px; margin-bottom: 8px; }
  .suggestion-card .sug-rationale { font-family: var(--sans); font-size: 13px; color: var(--ink-soft); }
  .suggestion-card .row { margin-top: 14px; }

  .dialog-thread { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
  .dialog-msg { font-family: var(--sans); font-size: 14px; padding: 10px 14px; border-radius: 10px; max-width: 85%; }
  .dialog-msg.user { align-self: flex-end; background: var(--ink); color: #fff; }
  .dialog-msg.ai { align-self: flex-start; background: var(--accent-soft); color: var(--ink); }

  .loading { font-family: var(--sans); font-size: 13px; color: var(--ink-soft); padding: 20px; text-align: center; }
  .error-box { font-family: var(--sans); font-size: 13px; color: #9c3b3b; background: #fbeaea; border-radius: 6px; padding: 12px 14px; margin-bottom: 16px; }

  .history-toggle { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); cursor: pointer; text-decoration: underline; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 7px; vertical-align: -2px; }
  button.secondary .spinner, button.link .spinner { border: 2px solid rgba(0,0,0,0.2); border-top-color: var(--accent); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .simple-lang-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .simple-lang-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .simple-lang-row label { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); cursor: pointer; user-select: none; }

  .metric-card { border: 1px solid var(--line); border-radius: 10px; padding: 20px; margin-bottom: 14px; background: #fff; }
  .metric-card.best { border-color: var(--accent); background: var(--accent-soft); }
  .metric-card.selected { border-color: var(--accent); background: var(--accent-soft); }
  .metric-card.at-max { opacity: 0.45; pointer-events: none; }
  .metric-rank { font-family: var(--sans); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--accent); margin-bottom: 8px; }
  .metric-text { font-size: 16px; line-height: 1.5; }
  .metric-rationale { font-family: var(--sans); font-size: 13px; color: var(--ink-soft); margin-top: 5px; }
  .refine-box { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
  .refine-box textarea { min-height: 72px; }
  .kpi-count-bar { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--ink); background: var(--accent-soft); border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; text-align: center; border: 1px solid var(--line); }
  .nsm-ref { font-family: var(--sans); font-size: 12px; color: var(--ink-soft); margin-bottom: 20px; }
  .nsm-ref strong { color: var(--ink); }
  .selected-badge { font-family: var(--sans); font-size: 11px; color: var(--accent); font-weight: 700; margin-left: 8px; }
  .metrics-cta { text-align: center; margin: 28px 0 0; padding: 24px; border-top: 1px solid var(--line); }
  .metrics-cta p { font-family: var(--sans); font-size: 13px; color: var(--ink-soft); margin: 0 0 14px; }
  .summary-block { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 32px; margin-bottom: 20px; }
  .summary-nsm-label { font-family: var(--sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); margin-bottom: 10px; }
  .summary-nsm-text { font-size: 20px; line-height: 1.45; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .summary-kpi-label { font-family: var(--sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--accent); margin-bottom: 14px; }
  .kpi-item { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 14px; font-size: 15px; line-height: 1.5; }
  .kpi-num { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--accent); min-width: 18px; padding-top: 2px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const SYSTEM_PROMPT = "# Idea Expansion Agent \u2014 System Prompt\n\n> Source of truth for the app. This file is loaded as the system prompt verbatim.\n> Edit within your section only when possible \u2014 see `## 0. Editing Guide` for conventions\n> that keep diffs small and merge conflicts rare.\n\n---\n\n## 0. Editing Guide\n\n- Each `##` section is independent. Don't restructure another section to fix yours.\n- Within a section, prefer one idea per bullet / one bullet per line. Never combine\n  edits into a single run-on paragraph \u2014 it causes line-level merge conflicts.\n- Adding to a list? Append at the end of the list, not alphabetically interleaved,\n  unless the list explicitly says \"keep alphabetized.\"\n- If you change behavior described in `## 1. Role & Purpose` or `## 2. Non-Goals`,\n  flag it in your PR description \u2014 those two sections are the contract every other\n  section depends on.\n- Bump `## 9. Changelog` with every substantive edit (one line, your initials, date).\n\n---\n\n## 1. Role & Purpose\n\nYou are an **idea expansion partner** for early-stage product ideas. The person you're\nworking with has a product concept in its infancy \u2014 a rough sketch, not a spec \u2014 and\nneeds help seeing the full shape of it before they commit to building anything.\n\nYour job is not to organize or prioritize what they already have. Your job is to:\n\n1. **Surface blind spots** \u2014 dimensions of the idea they haven't considered.\n2. **Expand divergently** \u2014 widen the surface area of the idea (adjacent use cases,\n   stakeholders, failure modes, market context, emotional/social dimensions) before\n   any narrowing happens.\n3. **Calibrate intent** \u2014 the way they first stated the idea is a rough draft of what\n   they actually mean. Through questioning, find the gap between what they said and\n   what they're really reaching for, and close it.\n4. **Synthesize what they can't finish alone** \u2014 assume the user can articulate part\n   of the idea but not all of it. You complete the picture using reasoning and\n   synthesis they couldn't have produced solo \u2014 including connections across domains,\n   precedents, and second-order consequences.\n\nThe product in question is *usually* digital, but treat that as a default assumption,\nnot a constraint \u2014 let the idea itself tell you what it wants to be.\n\n**Success is measured against one bar:** the final deliverable must be better, more\naccurate, clearer, more comprehensive, and more holistic than the user's original\nstatement of the idea. If you've only reorganized their words, you've failed.\n\n---\n\n## 2. Non-Goals\n\nExplicitly out of scope. Do not let the conversation drift into these:\n\n- **Not a prioritization tool.** Do not rank, sequence, or triage an existing roadmap.\n  If the user already has a roadmap and asks you to prioritize it, that's a different\n  tool \u2014 redirect them rather than attempting it here.\n- **Not rapid/lightweight prototyping.** Do not rush to a single \"lightly intentional\"\n  answer. Depth and divergence come before convergence. Resist the urge to wrap up\n  after one or two questions.\n- **Not validation theater.** Don't just affirm the idea is good. Your value is in\n  finding what's missing, not in cheerleading.\n- **Not a replacement for the user's voice.** You expand and clarify intent \u2014 you\n  don't replace it with a generic \"best practice\" idea that isn't theirs anymore.\n\n---\n\n## 3. User Flow (must be followed in order)\n\n1. **Intake.** User states their idea, in whatever form it arrives (a sentence, a\n   paragraph, a fragment). Do not critique or expand yet.\n2. **Interactive question loop.** Ask questions in small batches (see `## 4. Question\n   Bank`), one round at a time \u2014 never the whole bank at once. After each round of\n   answers, decide whether you have enough surface area, or need another round.\n   - Keep looping until you've covered breadth (see `## 5. Coverage Checklist`) \u2014\n     not a fixed number of rounds.\n   - It's OK, and expected, for your questions to introduce framings or possibilities\n     the user hasn't mentioned \u2014 that's the divergent-expansion job, not scope creep.\n   - Let the user end the loop early if they explicitly say so, but tell them what\n     coverage gaps remain if they do.\n3. **Synthesis.** Once coverage is sufficient, stop asking questions and produce the\n   deliverable (see `## 6. Output Format`).\n4. **Comparison.** Always close by showing the user's *original* idea statement\n   verbatim, side by side with the new synthesis, so the delta is visible.\n5. **Blind Spot Roll-In (optional, repeatable).** Synthesis is not necessarily\n   terminal. The user may choose to integrate any individual item from \"Blind\n   Spots Surfaced\" back into the idea \u2014 see `## 6a. Blind Spot Roll-In` for the\n   behavior this triggers. Each roll-in produces an updated Synthesis document;\n   the user can roll in any number of remaining blind spots, one at a time.\n6. **Success Metrics.** After Synthesis (and any Roll-Ins the user chooses to\n   do), guide the user through defining one North Star Metric and exactly three\n   KPIs \u2014 see `## 6b. Success Metrics` for the full behavior. This section is\n   not optional; it follows Synthesis as the terminal phase of every session.\n\nDo not skip straight from intake to synthesis. Do not ask questions forever without\nconverging \u2014 watch the coverage checklist.\n\n---\n\n## 4. Question Bank\n\nOrganized by theme. Pull from across themes each round rather than exhausting one\ntheme before moving to the next \u2014 this keeps the questioning feeling exploratory\nrather than like a form. Add new questions to the end of a theme's list; don't\nrenumber existing ones.\n\n> Editing convention: each theme is its own sub-list. Add/edit within your theme\n> to avoid colliding with someone else's additions.\n\n### 4.1 Who & Why\n- Who is this for, specifically \u2014 not \"everyone,\" but the person in the moment of need?\n- What is the user doing right before and right after they'd use this?\n- Who is affected by this idea but isn't the direct user (payers, bystanders, teams)?\n- What does the user believe about themselves or their problem that this idea has to be compatible with?\n\n### 4.2 Problem Space\n- What is the actual pain \u2014 is it time, money, anxiety, status, coordination, trust?\n- What happens today, with no solution at all? What's the workaround?\n- Is this problem getting better or worse on its own, independent of you solving it?\n- What's adjacent to this problem that you're implicitly choosing not to solve?\n\n### 4.3 Shape & Form\n- Why does this need to be digital? What would the non-digital version look like?\n- Is this a tool, a service, a habit, an environment, a community, an object?\n- What's the smallest version of this that would still be recognizably \"it\"?\n- What's the most expansive version of this you'd be excited by, even if it scares you?\n\n### 4.4 Context & Forces\n- What else exists in this space already, even informally (not just direct competitors)?\n- What cultural, economic, or technological shift makes this newly possible or newly necessary?\n- Who would be threatened by this idea succeeding?\n- What constraints (regulatory, technical, social) does this have to survive contact with?\n\n### 4.5 Emotional & Identity Layer\n- How does the user want to feel before/during/after using this?\n- What would using this say about the user, to themselves or to others?\n- Is there a version of this that's purely functional vs. one that carries meaning \u2014 which are you actually drawn to?\n\n### 4.6 Edges & Failure\n- What does this look like if it's wildly misused?\n- What's the most embarrassing way this could fail?\n- What would make someone churn after loving it initially?\n\n---\n\n## 5. Coverage Checklist\n\nBefore moving to synthesis, confirm \u2014 internally, don't show this as a checklist to\nthe user \u2014 that you have enough material to speak to:\n\n- [ ] A specific user/persona and moment of need (not a generic audience)\n- [ ] The real underlying problem, distinct from the surface request\n- [ ] At least one blind spot the user explicitly hadn't considered before this conversation\n- [ ] The form factor and why it fits (or a deliberate reconsideration of form)\n- [ ] Surrounding context: adjacent solutions, timing, forces at play\n- [ ] The emotional/identity dimension, even briefly\n- [ ] At least one failure mode or edge case\n\nIf two or more boxes are still empty after a round of questions, run another round\ntargeting specifically those gaps rather than asking generic follow-ups.\n\n---\n\n## 6. Output Format\n\nProduce the synthesis as a single structured document with these parts, in order.\nKeep headers stable \u2014 downstream tooling/people may key off these exact names.\n\n1. **Refined Idea Statement** \u2014 one tight paragraph stating what the idea actually\n   is now, calibrated to the user's true intent (not just their original wording).\n2. **What Changed and Why** \u2014 a short list mapping original framing \u2192 refined framing,\n   with the reasoning, so the user can see your synthesis isn't arbitrary.\n3. **Blind Spots Surfaced** \u2014 the specific things the user hadn't considered, named\n   plainly, each with one sentence on why it matters.\n4. **Expanded Surface Area** \u2014 the new dimensions/angles uncovered (adjacent use cases,\n   stakeholders, forms, contexts) organized as a short list, not buried in prose.\n5. **Open Tensions** \u2014 places where the idea still has unresolved trade-offs or\n   forks; don't fake resolution where none exists yet.\n6. **Your Original Idea (Unedited)** \u2014 the user's first statement, quoted verbatim,\n   for direct comparison.\n\n---\n\n## 6a. Blind Spot Roll-In\n\nA user may select any single item from \"Blind Spots Surfaced\" and ask to integrate\nit into the current idea. This is a focused sub-flow, not a full re-run of the\nquestion loop.\n\n**Per blind spot, track one status:** `open` or `integrated`. Once integrated,\ntreat that blind spot as resolved \u2014 don't re-surface it as open in later rounds\nor later synthesis documents.\n\nWhen a blind spot is rolled in:\n\n1. **Generate exactly 3 integration suggestions**, ordered by your own\n   recommendation (best first). Each suggestion should be concrete \u2014 a specific\n   way the blind spot reshapes or adds to the Refined Idea Statement, not a\n   restatement of the blind spot itself. Briefly justify the ranking.\n   - Format each under its own header, exactly: `Suggestion 1 (Recommended)`,\n     `Suggestion 2`, `Suggestion 3` \u2014 stable headers downstream tooling keys\n     off of, same convention as `## 6. Output Format`.\n2. **The user may:**\n   - **Accept one of the 3 directly.** Integrate it immediately \u2014 revise the\n     Refined Idea Statement and any other affected Synthesis sections to reflect\n     it, mark that blind spot `integrated`, and return the full updated Synthesis\n     document.\n   - **Give feedback instead.** Open a short dialog: respond to the feedback,\n     refine the integration approach, and keep iterating until the user signals\n     they're ready to accept. Then integrate as above, exactly as if they'd\n     accepted one of the original 3 \u2014 there is no separate \"approve the\n     feedback version\" step beyond the user saying they're satisfied.\n3. **Only one blind spot is integrated per roll-in.** If the user wants to roll\n   in another, repeat this process for that item; each roll-in should account\n   for blind spots already integrated, so suggestions don't contradict or\n   duplicate prior integrations.\n\nThe output of a roll-in is always a complete, re-rendered Synthesis document\n(per `## 6. Output Format`) \u2014 never a fragment or diff-only response.\n\n---\n\n## 6b. Success Metrics\n\nThis section runs after Synthesis (and any Blind Spot Roll-Ins the user\ncompletes). It is the terminal phase of every session. It has two sequential\nsub-flows \u2014 North Star Metric, then KPIs \u2014 followed by a summary screen.\n\n### North Star Metric\n\n1. **Generate 3 recommendations.** Using the full conversation history \u2014\n   the user's original idea, all question-loop answers, and the final\n   Synthesis \u2014 generate exactly 3 candidate North Star Metrics. Each should\n   be a single, measurable statement that captures the single most important\n   signal of whether the product is working. Recommendations must be specific\n   to this idea; generic metrics (e.g. \"monthly active users\") are only\n   acceptable if they are genuinely the best fit. Order them by your own\n   recommendation (best fit first).\n2. **Present the 3 candidates plus an open text option.** The user sees all\n   3 at once, and can also enter their own. For each candidate (and for the\n   user's own entry once submitted), two actions are available:\n   - **\"Use this\"** \u2014 adopts that metric as the North Star Metric and\n     advances to the KPI sub-flow.\n   - **\"Refine\"** \u2014 opens a text input for the user to describe how they'd\n     like to adjust it. Respond by generating a revised version of that\n     specific metric incorporating their feedback, then re-present the same\n     two options (\"Use this\" / \"Refine\") on the revised version. Continue\n     iterating as many times as the user needs, until they click \"Use this.\"\n3. **Only one North Star Metric is selected.** Once the user clicks \"Use\n   this\" on any candidate or their own entry (at any refinement stage), that\n   metric is locked. Do not ask for confirmation \u2014 proceed immediately to the\n   KPI sub-flow.\n\n### KPIs\n\n1. **Generate 5 recommendations.** Using the same conversation history and\n   the now-confirmed North Star Metric, generate exactly 5 candidate KPIs.\n   Each KPI should be a measurable indicator that is meaningfully subordinate\n   to the North Star \u2014 leading indicators, health metrics, or behavioral\n   signals that collectively explain whether the NSM is moving. Order them by\n   your own recommendation (most relevant first).\n2. **Present the 5 candidates plus an open text option.** The user sees all 5\n   at once, plus the ability to type in their own. For each candidate (and for\n   any user-entered KPI once submitted), two actions are available:\n   - **\"Use this\"** \u2014 adds that KPI to the user's selected set.\n   - **\"Refine\"** \u2014 opens a text input for the user to describe how they'd\n     like to adjust it. Respond with a revised version of that KPI\n     incorporating their feedback, then re-present \"Use this\" / \"Refine.\"\n     Continue iterating until the user clicks \"Use this.\"\n3. **The user selects exactly 3 KPIs.** Track the running count (0 of 3, 1\n   of 3, 2 of 3, 3 of 3). Once 3 KPIs are selected, the sub-flow closes\n   automatically and advances to the summary screen. Do not allow a fourth\n   selection. A selected KPI can be de-selected before the count reaches 3,\n   returning it to available status; the same refinement flow is available\n   again if needed.\n\n### Summary Screen\n\nDisplay a clean, read-only summary showing:\n- **North Star Metric** \u2014 the confirmed metric, labeled clearly.\n- **KPIs (3)** \u2014 the three confirmed KPIs, listed in the order they were\n  selected.\n\nThis is the terminal state of the session. No further action is expected\nbeyond this screen. Include a copy/export action for the summary content.\n\n---\n\n## 6c. Idea Suggestion\n\nTriggered when the user clicks \"Create an idea\" during the Intake phase. This\nis a one-shot generation, not part of the question loop or synthesis flow.\n\nWhen triggered:\n\n1. **Generate exactly one idea.** Produce a single high-level sentence describing\n   a digital solution to a small, mundane, annoying, or manual real-world task.\n   - The task does not need to be computer-related \u2014 offline tasks in need of a\n     digital solution are encouraged.\n   - The solution may address all or part of the task, but must meaningfully\n     improve it.\n   - State the idea at a high level only. No implementation details, no specific\n     technologies, no mention of how it would be built.\n   - One sentence. No preamble, no explanation, no follow-up.\n2. **Vary across calls.** Each invocation must produce an idea in a clearly\n   different life domain from any previously suggested. All ideas generated\n   so far in this session will be provided to you \u2014 treat every domain\n   represented in that list as off-limits. Do not produce variations or\n   adjacent riffs on any problem space already visited.\n3. **Ignore surrounding context.** This call is independent of your role as\n   an idea expansion partner. Do not let the product and startup focus of\n   this system prompt influence your domain choice. Draw from ordinary,\n   non-product life \u2014 chores, errands, habits, social obligations, seasonal\n   tasks \u2014 not from the world of apps and startups.\n4. **Scope of tasks to draw from.** Examples of the kinds of tasks to target\n   (non-exhaustive, non-binding \u2014 use these to calibrate, not as a fixed list):\n   home maintenance, cooking and pantry management, parking and commuting,\n   medication tracking, plant care, mail and deliveries, laundry, paper forms\n   and receipts, social coordination, event logistics, clothing care.\n\n---\n\n## 6d. Simple Language Mode\n\nWhen the user enables Simple Language Mode, all AI-generated prose addressed\nto the user must follow these rules for the entire session:\n\n1. **No filler words.** Remove words that add length without adding meaning:\n   \"essentially,\" \"basically,\" \"actually,\" \"really,\" \"very,\" \"quite,\"\n   \"certainly,\" \"of course,\" \"as you can see,\" \"it's worth noting,\" etc.\n2. **No unnecessary adjectives.** Only use descriptors that change the meaning\n   of the sentence. If removing the adjective leaves the meaning intact,\n   remove it.\n3. **Only necessary words.** Every word must earn its place. If a sentence can\n   be shortened without losing meaning, shorten it.\n4. **Scope \u2014 applies to:**\n   - Questions in the question loop\n   - All sections of the Synthesis document (refined idea, what changed, blind\n     spots, expanded surface area, open tensions, original idea comparison)\n   - Roll-in suggestions and roll-in dialog messages\n   - North Star Metric and KPI candidates and refinements\n   - Idea suggestions (## 6c)\n   - Any other prose the AI generates that the user reads\n5. **Scope \u2014 does NOT apply to:**\n   - UI labels, tab names, button text, section titles, field labels\n   - Structural or instructional text generated by the application shell\n   - The user's own words (never alter quoted or verbatim user input)\n\nSimple Language Mode does not change what is said \u2014 only how many words are\nused to say it. Meaning, completeness, and accuracy must be preserved.\n\n---\n\n## 7. Tone & Behavior\n\n- Be a thinking partner, not an interviewer reading a script \u2014 questions should feel\n  responsive to what was just said, even when pulled from `## 4. Question Bank`.\n- Challenge gently but directly. If the idea as stated seems to contradict itself or\n  avoid the hard part, say so.\n- Don't pad with affirmations (\"Great idea!\") \u2014 spend that space on substance.\n- It is acceptable, and expected, to introduce concepts/precedents/analogies from\n  outside the user's stated domain if they genuinely expand the idea's surface area.\n- Never let the loop run on autopilot \u2014 each question should justify itself by what\n  it could reveal, not just fill a slot in the bank.\n\n---\n\n## 8. Example Interaction Sketch (non-binding, illustrative only)\n\nThis section is for onboarding new contributors to the prompt's intent \u2014 it is not\ninstruction text the model should imitate verbatim.\n\n```\nUser: \"An app that reminds people to call their parents.\"\n\nRound 1 questions might probe: who initiates today without the app, what's the\nactual barrier (forgetting? guilt? not knowing what to say?), what does \"calling\"\neven mean here (voice? could it be something else?), what does a missed call mean\nemotionally to each side.\n\nAfter 2-3 rounds, synthesis might surface that the real idea is closer to\n\"a low-friction ritual for sustaining intergenerational connection,\" with blind\nspots like: the parent's side of the experience was never considered, the guilt-\nbased framing could backfire, and \"calling\" may not be the right modality at all\nfor the actual underlying need.\n```\n\n---\n\n## 9. Changelog\n\n- 2026-06-17 \u2014 initial version drafted.\n- 2026-06-22 \u2014 added Blind Spot Roll-In sub-flow (`## 6a`) and made Synthesis\n  non-terminal in the user flow.\n- 2026-06-22 \u2014 added explicit suggestion header format to `## 6a` (build-time\n  parseability requirement, no behavior change).\n- 2026-06-29 \u2014 added Success Metrics terminal phase (`## 6b`) and step 6 in\n  `## 3. User Flow`; covers North Star Metric sub-flow, KPI sub-flow, and\n  summary screen.\n- 2026-06-29 \u2014 added Idea Suggestion one-shot behavior (`## 6c`) for the\n  \"Create an idea\" Intake affordance.\n- 2026-06-29 \u2014 added Simple Language Mode behavior (`## 6d`); applies to all\n  AI-generated prose when the toggle is on, excludes UI chrome.\n- 2026-06-29 \u2014 strengthened `## 6c` vary-across-calls rule: previous suggestion\n  passed in prompt; its domain is off-limits for the next call.\n- 2026-06-29 \u2014 further strengthened `## 6c`: all session ideas passed as\n  off-limits; added explicit instruction to ignore product/startup context.\n";

const SIMPLE_LANG_SUFFIX = '\n\nSIMPLE LANGUAGE MODE IS ACTIVE: Apply ## 6d rules to all prose you generate in this response. No filler words, no unnecessary adjectives, only necessary words. Do not alter UI labels, section titles, or the user\'s own words.';

const ENVELOPE_INSTRUCTIONS = `
---
INTEGRATION NOTE (from the application shell, not part of your behavioral spec):
Respond with ONLY a single JSON object (no prose outside it, no markdown fences) matching one of these shapes:

1. Asking a round of questions:
{"phase":"questions","questions":["q1","q2","q3","q4"],"coverage_note":"<ONLY include if coverage is sufficient — one-line summary of remaining gap>"}

2. Producing the Synthesis deliverable:
{"phase":"synthesis","refined_idea":"...","what_changed":[{"original":"...","refined":"...","reasoning":"..."}],"blind_spots":[{"id":"bs1","text":"...","why":"...","status":"open"}],"expanded_surface_area":["..."],"open_tensions":["..."],"original_idea":"<verbatim>"}
Each blind_spots item needs a stable short id (bs1, bs2, ...). status is "open" or "integrated".

3. Generating 3 Blind Spot Roll-In suggestions:
{"phase":"rollin_suggestions","blind_spot_id":"<id>","suggestions":[{"label":"Suggestion 1 (Recommended)","text":"...","rationale":"..."},{"label":"Suggestion 2","text":"...","rationale":"..."},{"label":"Suggestion 3","text":"...","rationale":"..."}]}

4. Replying inside Roll-In feedback dialog (not finalized):
{"phase":"rollin_dialog","message":"..."}

5. Finalizing a Roll-In — return full updated Synthesis with rolled-in blind spot status set to "integrated".
(same shape as #2, phase "synthesis")

6. Generating 3 North Star Metric candidates (when asked to start Success Metrics):
{"phase":"metrics_nsm","candidates":["<metric 1>","<metric 2>","<metric 3>"]}
Ordered best-fit first. Each is a single measurable statement specific to this idea.

7. Returning a single refined NSM (in response to user refine feedback):
{"phase":"metrics_nsm_refined","text":"<revised metric incorporating feedback>"}

8. Generating 5 KPI candidates (when NSM is confirmed):
{"phase":"metrics_kpi","candidates":[{"text":"<kpi>","rationale":"<one sentence on why it supports the NSM>"},...5 total]}
Ordered most relevant first. Each is subordinate to the confirmed NSM.

9. Returning a single refined KPI (in response to user refine feedback):
{"phase":"metrics_kpi_refined","text":"<revised kpi>","rationale":"<revised rationale>"}

10. Generating an idea suggestion (when "Create an idea" is clicked in Intake):
{"phase":"idea_suggestion","idea":"<single sentence — a high-level digital solution to a mundane real-world task, per ## 6c of the system prompt>"}

Always pick exactly one shape. Keep all reasoning and judgment governed by your system prompt.`;

const state = {
  apiKey: localStorage.getItem('idea_expansion_api_key') || '',
  phase: 'intake',
  simpleLanguage: false,
  generatedIdea: '',
  generatedIdeaHistory: [],
  messages: [],
  originalIdea: '',
  rounds: [],
  currentQuestions: null,
  currentCoverageNote: null,
  synthesis: null,
  rollin: null,
  loading: false,
  busyAction: null,
  error: null,
  showHistory: false,
  metrics: {
    nsmCandidates: null,
    ownNsmText: '',
    ownNsmSubmitted: false,
    ownNsmRefineOpen: false,
    pendingRefineId: null,
    nsmConfirmed: null,
    kpiCandidates: null,
    ownKpiText: '',
    ownKpiRationale: '',
    ownKpiSubmitted: false,
    ownKpiRefineOpen: false,
    ownKpiSelected: false,
    selectedKpis: [],
  }
};

function save() { localStorage.setItem('idea_expansion_api_key', state.apiKey); }
function slSuffix() { return state.simpleLanguage ? SIMPLE_LANG_SUFFIX : ''; }

async function callModel(userText) {
  state.messages.push({ role: 'user', content: userText + slSuffix() + '\n' + ENVELOPE_INSTRUCTIONS });
  state.loading = true; state.error = null; render();
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 4096, system: SYSTEM_PROMPT, messages: state.messages }),
    });
    if (!resp.ok) { const e = await resp.text(); throw new Error(`API error ${resp.status}: ${e.slice(0,300)}`); }
    const data = await resp.json();
    const textBlock = (data.content || []).find(b => b.type === 'text');
    const raw = textBlock ? textBlock.text : '';
    state.messages.push({ role: 'assistant', content: raw });
    let parsed;
    try { const cleaned = raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,''); parsed = JSON.parse(cleaned); }
    catch(e) { throw new Error('Could not parse model response as JSON: ' + e.message); }
    state.loading = false; state.busyAction = null;
    return parsed;
  } catch(e) {
    state.loading = false; state.busyAction = null; state.error = e.message; render(); throw e;
  }
}

async function callModelEphemeral(userText) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 256, system: SYSTEM_PROMPT, messages: [{ role: 'user', content: userText + slSuffix() }] }),
  });
  if (!resp.ok) { const e = await resp.text(); throw new Error(`API error ${resp.status}: ${e.slice(0,300)}`); }
  const data = await resp.json();
  const textBlock = (data.content || []).find(b => b.type === 'text');
  const raw = textBlock ? textBlock.text : '';
  const cleaned = raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'');
  return JSON.parse(cleaned);
}

function applyEnvelope(parsed) {
  const m = state.metrics;
  if (parsed.phase === 'questions') {
    state.phase = 'questions'; state.currentQuestions = parsed.questions; state.currentCoverageNote = parsed.coverage_note || null;
  } else if (parsed.phase === 'synthesis') {
    state.phase = 'synthesis'; state.synthesis = parsed; state.rollin = null;
  } else if (parsed.phase === 'rollin_suggestions') {
    state.phase = 'rollin'; state.rollin = { blindSpotId: parsed.blind_spot_id, suggestions: parsed.suggestions, dialog: [] };
  } else if (parsed.phase === 'rollin_dialog') {
    if (state.rollin) state.rollin.dialog.push({ role: 'ai', text: parsed.message });
  } else if (parsed.phase === 'metrics_nsm') {
    state.phase = 'metrics_nsm';
    m.nsmCandidates = parsed.candidates.map((text, i) => ({ id: 'nsm' + i, currentText: text, refineOpen: false }));
    m.ownNsmSubmitted = false; m.ownNsmText = ''; m.ownNsmRefineOpen = false; m.pendingRefineId = null;
  } else if (parsed.phase === 'metrics_nsm_refined') {
    const id = m.pendingRefineId; m.pendingRefineId = null;
    if (id === 'nsm_own') { m.ownNsmText = parsed.text; m.ownNsmRefineOpen = false; }
    else { const c = m.nsmCandidates.find(c => c.id === id); if (c) { c.currentText = parsed.text; c.refineOpen = false; } }
  } else if (parsed.phase === 'metrics_kpi') {
    state.phase = 'metrics_kpi';
    m.kpiCandidates = parsed.candidates.map((c, i) => ({ id: 'kpi' + i, currentText: c.text, currentRationale: c.rationale, refineOpen: false, selected: false }));
    m.selectedKpis = []; m.ownKpiSubmitted = false; m.ownKpiText = ''; m.ownKpiRationale = ''; m.ownKpiRefineOpen = false; m.ownKpiSelected = false; m.pendingRefineId = null;
  } else if (parsed.phase === 'metrics_kpi_refined') {
    const id = m.pendingRefineId; m.pendingRefineId = null;
    if (id === 'kpi_own') { m.ownKpiText = parsed.text; m.ownKpiRationale = parsed.rationale || ''; m.ownKpiRefineOpen = false; }
    else { const c = m.kpiCandidates.find(c => c.id === id); if (c) { c.currentText = parsed.text; c.currentRationale = parsed.rationale || c.currentRationale; c.refineOpen = false; } }
  }
  render();
}

/* --- Actions --- */

async function submitIntake(ideaText) {
  state.originalIdea = ideaText; state.busyAction = 'submitIdea';
  try { applyEnvelope(await callModel(`My idea: ${ideaText}\n\nBegin per your Role & Purpose and User Flow. Start the interactive question loop with your first round of questions.`)); } catch(e) { render(); }
}

async function generateIdea() {
  if (!state.apiKey) return;
  state.busyAction = 'generateIdea'; state.error = null; render();
  try {
    const history = state.generatedIdeaHistory;
    const historyNote = history.length > 0
      ? `Ideas already suggested this session (all domains off-limits): ${history.map((idea, i) => `${i + 1}. "${idea}"`).join(' ')}. `
      : '';
    const parsed = await callModelEphemeral(
      historyNote +
      'Generate one idea suggestion per ## 6c of your system prompt. ' +
      'Respond with ONLY this JSON object: {"phase":"idea_suggestion","idea":"<your single sentence here>"}'
    );
    if (parsed.idea) {
      state.generatedIdeaHistory.push(parsed.idea);
      state.generatedIdea = parsed.idea;
    }
  } catch(e) { state.error = e.message; }
  state.busyAction = null; render();
}

async function submitRound(answers) {
  state.rounds.push({ questions: state.currentQuestions, answers, coverageNote: state.currentCoverageNote });
  const answerText = state.currentQuestions.map((q,i) => `Q: ${q}\nA: ${answers[i] || '(no answer given)'}`).join('\n\n');
  state.busyAction = 'submitRound';
  try { applyEnvelope(await callModel(`Here are my answers to round ${state.rounds.length}:\n\n${answerText}\n\nDecide whether you have enough coverage to move to Synthesis, or need another round.`)); } catch(e) { render(); }
}

async function endLoopEarly() {
  state.rounds.push({ questions: state.currentQuestions, answers: [], coverageNote: state.currentCoverageNote, skipped: true });
  state.busyAction = 'endLoop';
  try { applyEnvelope(await callModel(`I'd like to end the question loop now and move to Synthesis. Produce the Synthesis deliverable, accounting for coverage gaps in Open Tensions where relevant.`)); } catch(e) { render(); }
}

async function startRollin(bsId) {
  const bs = state.synthesis.blind_spots.find(b => b.id === bsId);
  state.busyAction = 'rollin:' + bsId;
  try { applyEnvelope(await callModel(`I want to roll in this blind spot: "${bs.text}" (id: ${bsId}). Per ## 6a, generate exactly 3 integration suggestions.`)); } catch(e) { render(); }
}

async function acceptSuggestion(idx, text) {
  state.busyAction = 'accept:' + idx;
  try { applyEnvelope(await callModel(`I accept this integration suggestion: "${text}". Integrate it per ## 6a step 2 — mark blind spot ${state.rollin.blindSpotId} as integrated and return the full updated Synthesis.`)); } catch(e) { render(); }
}

async function sendRollinFeedback(feedbackText) {
  state.rollin.dialog.push({ role: 'user', text: feedbackText }); state.busyAction = 'feedback'; render();
  try { applyEnvelope(await callModel(`Feedback on roll-in suggestions for blind spot ${state.rollin.blindSpotId}: ${feedbackText}\n\nIf I'm signaling satisfaction, finalize the integration (phase "synthesis"). Otherwise continue refining (phase "rollin_dialog").`)); } catch(e) { render(); }
}

function abandonRollin() { state.phase = 'synthesis'; state.rollin = null; render(); }

async function enterSuccessMetrics() {
  state.busyAction = 'metrics_enter';
  try { applyEnvelope(await callModel(`The user is ready to define Success Metrics. Using the full conversation history, generate exactly 3 North Star Metric candidates per ## 6b. Order them best-fit first.`)); } catch(e) { render(); }
}

function openNsmRefine(id) {
  const m = state.metrics;
  if (m.nsmCandidates) m.nsmCandidates.forEach(c => { c.refineOpen = (c.id === id); });
  m.ownNsmRefineOpen = (id === 'nsm_own');
  if (id === 'nsm_own' && m.nsmCandidates) m.nsmCandidates.forEach(c => { c.refineOpen = false; });
  render();
}

async function submitNsmRefine(id, feedback) {
  const m = state.metrics; m.pendingRefineId = id; state.busyAction = 'nsm_refine:' + id;
  const current = id === 'nsm_own' ? m.ownNsmText : m.nsmCandidates.find(c => c.id === id)?.currentText;
  try { applyEnvelope(await callModel(`The user wants to refine this North Star Metric: "${current}"\nFeedback: ${feedback}\n\nReturn a single refined NSM (phase "metrics_nsm_refined").`)); } catch(e) { render(); }
}

function submitOwnNsm(text) {
  const m = state.metrics; m.ownNsmText = text; m.ownNsmSubmitted = true; m.ownNsmRefineOpen = false; render();
}

async function confirmNsm(text) {
  state.metrics.nsmConfirmed = text; state.busyAction = 'nsm_confirm';
  try { applyEnvelope(await callModel(`The user confirmed their North Star Metric: "${text}"\n\nGenerate exactly 5 KPI candidates per ## 6b, subordinate to this NSM. Order them most relevant first.`)); } catch(e) { render(); }
}

function openKpiRefine(id) {
  const m = state.metrics;
  if (m.kpiCandidates) m.kpiCandidates.forEach(c => { c.refineOpen = (c.id === id); });
  m.ownKpiRefineOpen = (id === 'kpi_own');
  if (id === 'kpi_own' && m.kpiCandidates) m.kpiCandidates.forEach(c => { c.refineOpen = false; });
  render();
}

async function submitKpiRefine(id, feedback) {
  const m = state.metrics; m.pendingRefineId = id; state.busyAction = 'kpi_refine:' + id;
  const c = id === 'kpi_own' ? { currentText: m.ownKpiText, currentRationale: m.ownKpiRationale } : m.kpiCandidates.find(c => c.id === id);
  try { applyEnvelope(await callModel(`The user wants to refine this KPI: "${c.currentText}"\nFeedback: ${feedback}\n\nReturn a single refined KPI (phase "metrics_kpi_refined").`)); } catch(e) { render(); }
}

function submitOwnKpi(text) {
  const m = state.metrics; m.ownKpiText = text; m.ownKpiRationale = ''; m.ownKpiSubmitted = true; m.ownKpiRefineOpen = false; render();
}

function selectKpi(id, text) {
  const m = state.metrics;
  if (m.selectedKpis.length >= 3 || m.selectedKpis.find(k => k.id === id)) return;
  m.selectedKpis.push({ id, text });
  if (m.kpiCandidates) { const c = m.kpiCandidates.find(c => c.id === id); if (c) c.selected = true; }
  if (id === 'kpi_own') m.ownKpiSelected = true;
  if (m.selectedKpis.length === 3) state.phase = 'metrics_summary';
  render();
}

function deselectKpi(id) {
  const m = state.metrics;
  m.selectedKpis = m.selectedKpis.filter(k => k.id !== id);
  if (m.kpiCandidates) { const c = m.kpiCandidates.find(c => c.id === id); if (c) c.selected = false; }
  if (id === 'kpi_own') m.ownKpiSelected = false;
  render();
}

/* --- Rendering --- */

function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
function spin() { return '<span class="spinner"></span>Working…'; }

function renderPhaseBar() {
  const steps = ['Intake','Questions','Synthesis','Metrics'];
  const idx = state.phase === 'intake' ? 0 : state.phase === 'questions' ? 1 : ['synthesis','rollin'].includes(state.phase) ? 2 : 3;
  return '<div class="phase-bar">' + steps.map((s,i) => {
    const cls = i===idx ? 'active' : i<idx ? 'done' : '';
    return `<span class="phase-step ${cls}">${s}</span>` + (i < steps.length-1 ? '<span class="phase-sep">&middot;</span>' : '');
  }).join('') + '</div>';
}

function metricsStepBar(n) {
  const labels = ['North Star Metric','KPIs','Summary'];
  return `<div class="metrics-step-bar">Step <strong>${n} of 3</strong> — ${labels[n-1]}</div>`;
}

function keybar() {
  return `<div class="keybar"><span>Anthropic API key:</span><input id="apiKeyInput" type="password" placeholder="sk-ant-..." value="${esc(state.apiKey)}" /><button class="secondary" id="saveKeyBtn">Save</button></div>`;
}

function errBox() { return state.error ? `<div class="error-box">${esc(state.error)}</div>` : ''; }

function renderHistory() {
  if (!state.rounds.length) return '';
  const tog = `<div class="row"><span class="history-toggle" id="historyToggle">${state.showHistory ? 'Hide' : 'Show'} prior rounds (${state.rounds.length})</span></div>`;
  if (!state.showHistory) return tog;
  return tog + state.rounds.map((r,i) => `<div class="card dim"><div class="round-num">Round ${i+1}${r.skipped?' (skipped)':''}</div>${r.questions.map((q,qi) => `<div class="question-item"><label>${esc(q)}</label><div style="font-size:14px;color:var(--ink-soft)">${esc(r.answers[qi]||'(no answer)')}</div></div>`).join('')}</div>`).join('');
}

function renderIntake() {
  const genBusy = state.busyAction === 'generateIdea';
  const genDisabled = !state.apiKey || state.loading || genBusy;
  return `
  <h1 class="title">Idea Expansion</h1>
  <p class="sub">State your idea, in whatever form it arrives.</p>
  ${keybar()}${errBox()}
  <div class="card">
    <div class="label-row">
      <span class="label">Your idea</span>
      <button class="link" id="generateIdeaBtn" ${genDisabled ? 'disabled' : ''}>${genBusy ? spin() : 'Create an idea'}</button>
    </div>
    <textarea id="ideaInput" placeholder="A rough sketch is enough...">${esc(state.generatedIdea)}</textarea>
    <div class="simple-lang-row">
      <input type="checkbox" id="simpleLangToggle" ${state.simpleLanguage ? 'checked' : ''} />
      <label for="simpleLangToggle">Simple language</label>
    </div>
    <div class="row end">
      <button id="submitIdeaBtn" ${state.loading || !state.apiKey ? 'disabled' : ''}>${state.busyAction === 'submitIdea' ? spin() : 'Begin'}</button>
    </div>
    ${!state.apiKey ? '<div class="gap-note">Add your API key above to begin.</div>' : ''}
  </div>`;
}

function renderQuestions() {
  const qs = state.currentQuestions || [];
  return `<h1 class="title">Idea Expansion</h1><p class="sub">Round ${state.rounds.length+1} — answer what resonates, skip what doesn't.</p>${keybar()}${errBox()}${renderHistory()}<div class="card"><div class="round-num">Round ${state.rounds.length+1}</div>${qs.map((q,i) => `<div class="question-item"><label>${esc(q)}</label><input type="text" data-qidx="${i}" class="answerInput" /></div>`).join('')}${state.currentCoverageNote ? `<div class="gap-note">Coverage looks sufficient. Remaining gap if you stop: ${esc(state.currentCoverageNote)}</div>` : ''}<div class="row between"><button class="secondary" id="endLoopBtn" ${state.loading?'disabled':''}>${state.busyAction==='endLoop'?spin():'End loop now &amp; synthesize'}</button><button id="submitRoundBtn" ${state.loading?'disabled':''}>${state.busyAction==='submitRound'?spin():'Submit round'}</button></div></div>`;
}

function renderSynthesis() {
  const s = state.synthesis; if (!s) return '<div class="loading">Loading…</div>';
  return `<h1 class="title">Synthesis</h1>${keybar()}${errBox()}<div class="top-actions"><span class="label" style="margin:0">Your refined idea</span><button class="secondary" id="copyBtn">Copy document</button></div><div class="card synth-doc" id="synthDoc"><h2>Refined Idea Statement</h2><p>${esc(s.refined_idea)}</p><h2>What Changed and Why</h2>${(s.what_changed||[]).map(c=>`<div class="change-item"><div class="arrow-line">${esc(c.original)} &rarr; ${esc(c.refined)}</div><div>${esc(c.reasoning)}</div></div>`).join('')}<h2>Blind Spots Surfaced</h2>${(s.blind_spots||[]).map(b=>`<div class="blind-spot"><div class="bs-text">${esc(b.text)}</div><div class="bs-why">${esc(b.why)}</div>${b.status==='integrated'?`<div class="bs-status integrated">This has been integrated.</div>`:`<div class="bs-status"><button class="link rollinBtn" data-bsid="${b.id}" ${state.loading?'disabled':''}>${state.busyAction==='rollin:'+b.id?spin():'Roll this into my idea'}</button></div>`}</div>`).join('')}<h2>Expanded Surface Area</h2><ul class="plain">${(s.expanded_surface_area||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul><h2>Open Tensions</h2><ul class="plain">${(s.open_tensions||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul><h2>Your Original Idea (Unedited)</h2><blockquote class="original">${esc(s.original_idea)}</blockquote></div><div class="metrics-cta"><p>Synthesis complete. Ready to define your success metrics?</p><button id="enterMetricsBtn" ${state.loading?'disabled':''}>${state.busyAction==='metrics_enter'?spin():'Define Success Metrics →'}</button></div>`;
}

function renderRollin() {
  const r = state.rollin; if (!r) return '<div class="loading">Loading…</div>';
  const bs = state.synthesis.blind_spots.find(b => b.id === r.blindSpotId);
  return `<h1 class="title">Roll In Blind Spot</h1><p class="sub">${esc(bs?bs.text:'')}</p>${keybar()}${errBox()}<div class="row"><button class="secondary" id="abandonRollinBtn">&larr; Back to Synthesis (no changes)</button></div><div style="margin-top:20px">${r.suggestions.map((s,i)=>`<div class="suggestion-card ${i===0?'recommended':''}"><div class="sug-label">${esc(s.label)}</div><div class="sug-text">${esc(s.text)}</div><div class="sug-rationale">${esc(s.rationale)}</div><div class="row"><button class="acceptBtn" data-idx="${i}" data-text="${esc(s.text)}" ${state.loading?'disabled':''}>${state.busyAction==='accept:'+i?spin():'Accept this'}</button></div></div>`).join('')}</div><div class="card"><div class="label">Or give feedback instead</div><div class="dialog-thread">${r.dialog.map(m=>`<div class="dialog-msg ${m.role}">${esc(m.text)}</div>`).join('')}</div><textarea id="feedbackInput" placeholder="Tell the AI what you'd change about these suggestions..." style="min-height:80px"></textarea><div class="row end"><button id="sendFeedbackBtn" ${state.loading?'disabled':''}>${state.busyAction==='feedback'?spin():'Send'}</button></div></div>`;
}

function nsmCardHtml(id, currentText, refineOpen, rankLabel, isBest) {
  const busy = state.busyAction === 'nsm_refine:' + id;
  const confirmBusy = state.busyAction === 'nsm_confirm';
  return `<div class="metric-card ${isBest?'best':''}">${rankLabel?`<div class="metric-rank">${rankLabel}</div>`:''}<div class="metric-text">${esc(currentText)}</div><div class="row"><button class="nsmConfirmBtn" data-text="${esc(currentText)}" ${state.loading?'disabled':''}>${confirmBusy?spin():'Use this'}</button><button class="secondary nsmRefineBtn" data-id="${id}" ${state.loading?'disabled':''}>${busy?spin():'Refine'}</button></div>${refineOpen?`<div class="refine-box"><div class="label">How would you refine this?</div><textarea class="nsmRefineInput" data-id="${id}" placeholder="Describe the change you'd like..."></textarea><div class="row end"><button class="nsmRefineSubmitBtn" data-id="${id}" ${state.loading?'disabled':''}>${busy?spin():'Submit refinement'}</button></div></div>`:''}</div>`;
}

function renderMetricsNsm() {
  const m = state.metrics; const cands = m.nsmCandidates;
  const ranks = ['Recommendation 1 — Best Fit','Recommendation 2','Recommendation 3'];
  return `<h1 class="title">Success Metrics</h1>${metricsStepBar(1)}<p class="sub">Define the single most important signal of whether your product is working.</p>${keybar()}${errBox()}${state.loading && !cands ? `<div class="loading">${spin()} Generating recommendations…</div>` : ''}${cands ? cands.map((c,i) => nsmCardHtml(c.id, c.currentText, c.refineOpen, ranks[i], i===0)).join('') : ''}<div class="card"><div class="label">Or define your own North Star Metric</div>${m.ownNsmSubmitted ? nsmCardHtml('nsm_own', m.ownNsmText, m.ownNsmRefineOpen, 'Your entry', false) : `<textarea id="ownNsmInput" placeholder="Describe the metric that matters most to you..." style="min-height:80px"></textarea><div class="row end"><button class="secondary" id="ownNsmSubmitBtn" ${state.loading?'disabled':''}>Submit</button></div>`}</div>`;
}

function kpiCardHtml(id, currentText, currentRationale, refineOpen, rankLabel, selected, atMax) {
  const busy = state.busyAction === 'kpi_refine:' + id;
  const isDisabled = !selected && atMax;
  return `<div class="metric-card ${selected?'selected':''} ${isDisabled?'at-max':''}">${rankLabel?`<div class="metric-rank">${rankLabel}${selected?'<span class="selected-badge">✓ Selected</span>':''}</div>`:(selected?'<div class="metric-rank"><span class="selected-badge">✓ Selected</span></div>':'')}<div class="metric-text">${esc(currentText)}</div>${currentRationale?`<div class="metric-rationale">${esc(currentRationale)}</div>`:''}<div class="row">${selected?`<button class="secondary kpiDeselectBtn" data-id="${id}" ${state.loading?'disabled':''}>Remove</button>`:`<button class="kpiSelectBtn" data-id="${id}" data-text="${esc(currentText)}" ${state.loading||isDisabled?'disabled':''}>Use this</button><button class="secondary kpiRefineBtn" data-id="${id}" ${state.loading||isDisabled?'disabled':''}>${busy?spin():'Refine'}</button>`}</div>${refineOpen&&!selected?`<div class="refine-box"><div class="label">How would you refine this KPI?</div><textarea class="kpiRefineInput" data-id="${id}" placeholder="Describe the change you'd like..."></textarea><div class="row end"><button class="kpiRefineSubmitBtn" data-id="${id}" ${state.loading?'disabled':''}>${busy?spin():'Submit refinement'}</button></div></div>`:''}</div>`;
}

function renderMetricsKpi() {
  const m = state.metrics; const cands = m.kpiCandidates; const sel = m.selectedKpis; const atMax = sel.length >= 3;
  const ranks = ['Most Relevant','Recommendation 2','Recommendation 3','Recommendation 4','Recommendation 5'];
  return `<h1 class="title">Success Metrics</h1>${metricsStepBar(2)}<p class="sub">Select 3 KPIs that explain whether your North Star is moving.</p>${keybar()}${errBox()}<div class="kpi-count-bar">${sel.length} of 3 KPIs selected</div><div class="nsm-ref">North Star Metric: <strong>${esc(m.nsmConfirmed||'')}</strong></div>${state.loading && !cands ? `<div class="loading">${spin()} Generating KPI recommendations…</div>` : ''}${cands ? cands.map((c,i) => kpiCardHtml(c.id, c.currentText, c.currentRationale, c.refineOpen, ranks[i], c.selected, atMax)).join('') : ''}<div class="card"><div class="label">Or add your own KPI</div>${m.ownKpiSubmitted ? kpiCardHtml('kpi_own', m.ownKpiText, m.ownKpiRationale, m.ownKpiRefineOpen, 'Your entry', m.ownKpiSelected, atMax && !m.ownKpiSelected) : `<textarea id="ownKpiInput" placeholder="Describe a KPI specific to your product..." style="min-height:80px"></textarea><div class="row end"><button class="secondary" id="ownKpiSubmitBtn" ${state.loading||atMax?'disabled':''}>Submit</button></div>`}</div>`;
}

function renderMetricsSummary() {
  const m = state.metrics;
  return `<h1 class="title">Success Metrics</h1>${metricsStepBar(3)}<p class="sub">Your metrics are defined.</p><div class="top-actions"><span class="label" style="margin:0">Your success metrics</span><button class="secondary" id="copyMetricsBtn">Copy summary</button></div><div class="summary-block" id="summaryBlock"><div class="summary-nsm-label">North Star Metric</div><div class="summary-nsm-text">${esc(m.nsmConfirmed||'')}</div><div class="summary-kpi-label">Key Performance Indicators</div>${m.selectedKpis.map((k,i) => `<div class="kpi-item"><div class="kpi-num">${i+1}.</div><div>${esc(k.text)}</div></div>`).join('')}</div>`;
}

function render() {
  const app = document.getElementById('app');
  let body = '';
  if (state.phase === 'intake') body = renderIntake();
  else if (state.phase === 'questions') body = renderQuestions();
  else if (state.phase === 'synthesis') body = renderSynthesis();
  else if (state.phase === 'rollin') body = renderRollin();
  else if (state.phase === 'metrics_nsm') body = renderMetricsNsm();
  else if (state.phase === 'metrics_kpi') body = renderMetricsKpi();
  else if (state.phase === 'metrics_summary') body = renderMetricsSummary();
  app.innerHTML = renderPhaseBar() + body;
  wireEvents();
}

function wireEvents() {
  const q = sel => document.querySelector(sel);
  const qa = sel => document.querySelectorAll(sel);

  const saveKeyBtn = q('#saveKeyBtn');
  if (saveKeyBtn) saveKeyBtn.onclick = () => { state.apiKey = q('#apiKeyInput').value.trim(); save(); render(); };

  const simpleLangToggle = q('#simpleLangToggle');
  if (simpleLangToggle) simpleLangToggle.onchange = () => { state.simpleLanguage = simpleLangToggle.checked; };

  const generateIdeaBtn = q('#generateIdeaBtn');
  if (generateIdeaBtn) generateIdeaBtn.onclick = () => generateIdea();

  const ideaInput = q('#ideaInput');
  if (ideaInput) ideaInput.oninput = () => { state.generatedIdea = ideaInput.value; };

  const submitIdeaBtn = q('#submitIdeaBtn');
  if (submitIdeaBtn) submitIdeaBtn.onclick = () => { const t = q('#ideaInput').value.trim(); if (t) submitIntake(t); };

  const submitRoundBtn = q('#submitRoundBtn');
  if (submitRoundBtn) submitRoundBtn.onclick = () => { const answers = Array.from(qa('.answerInput')).map(i => i.value.trim()); submitRound(answers); };

  const endLoopBtn = q('#endLoopBtn');
  if (endLoopBtn) endLoopBtn.onclick = () => endLoopEarly();

  const historyToggle = q('#historyToggle');
  if (historyToggle) historyToggle.onclick = () => { state.showHistory = !state.showHistory; render(); };

  const copyBtn = q('#copyBtn');
  if (copyBtn) copyBtn.onclick = () => { const doc = q('#synthDoc'); navigator.clipboard.writeText(doc.innerText).then(() => { copyBtn.textContent = 'Copied!'; setTimeout(() => { copyBtn.textContent = 'Copy document'; }, 1500); }); };

  qa('.rollinBtn').forEach(btn => { btn.onclick = () => startRollin(btn.dataset.bsid); });

  const abandonRollinBtn = q('#abandonRollinBtn');
  if (abandonRollinBtn) abandonRollinBtn.onclick = () => abandonRollin();

  qa('.acceptBtn').forEach(btn => { btn.onclick = () => acceptSuggestion(btn.dataset.idx, btn.dataset.text); });

  const sendFeedbackBtn = q('#sendFeedbackBtn');
  if (sendFeedbackBtn) sendFeedbackBtn.onclick = () => { const t = q('#feedbackInput').value.trim(); if (t) sendRollinFeedback(t); };

  const enterMetricsBtn = q('#enterMetricsBtn');
  if (enterMetricsBtn) enterMetricsBtn.onclick = () => enterSuccessMetrics();

  qa('.nsmConfirmBtn').forEach(btn => { btn.onclick = () => confirmNsm(btn.dataset.text); });
  qa('.nsmRefineBtn').forEach(btn => { btn.onclick = () => openNsmRefine(btn.dataset.id); });
  qa('.nsmRefineSubmitBtn').forEach(btn => {
    btn.onclick = () => { const ta = q(`.nsmRefineInput[data-id="${btn.dataset.id}"]`); const t = ta ? ta.value.trim() : ''; if (t) submitNsmRefine(btn.dataset.id, t); };
  });

  const ownNsmSubmitBtn = q('#ownNsmSubmitBtn');
  if (ownNsmSubmitBtn) ownNsmSubmitBtn.onclick = () => { const t = q('#ownNsmInput').value.trim(); if (t) submitOwnNsm(t); };

  qa('.kpiSelectBtn').forEach(btn => { btn.onclick = () => selectKpi(btn.dataset.id, btn.dataset.text); });
  qa('.kpiDeselectBtn').forEach(btn => { btn.onclick = () => deselectKpi(btn.dataset.id); });
  qa('.kpiRefineBtn').forEach(btn => { btn.onclick = () => openKpiRefine(btn.dataset.id); });
  qa('.kpiRefineSubmitBtn').forEach(btn => {
    btn.onclick = () => { const ta = q(`.kpiRefineInput[data-id="${btn.dataset.id}"]`); const t = ta ? ta.value.trim() : ''; if (t) submitKpiRefine(btn.dataset.id, t); };
  });

  const ownKpiSubmitBtn = q('#ownKpiSubmitBtn');
  if (ownKpiSubmitBtn) ownKpiSubmitBtn.onclick = () => { const t = q('#ownKpiInput').value.trim(); if (t) submitOwnKpi(t); };

  const copyMetricsBtn = q('#copyMetricsBtn');
  if (copyMetricsBtn) copyMetricsBtn.onclick = () => { const block = q('#summaryBlock'); navigator.clipboard.writeText(block.innerText).then(() => { copyMetricsBtn.textContent = 'Copied!'; setTimeout(() => { copyMetricsBtn.textContent = 'Copy summary'; }, 1500); }); };
}

render();
</script>
</body>
</html>
